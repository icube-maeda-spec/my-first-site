<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>案件掲示板</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; margin: 0; }
        
        /* サイドバーの基本設定 */
        aside { width: 250px; background: white; height: 100vh; border-right: 1px solid #ddd; transition: 0.3s; padding: 20px; }
        aside.closed { width: 0; padding: 20px 0; overflow: hidden; }

        /* 矢印ボタンの設定 */
        .toggle-btn { cursor: pointer; font-size: 20px; margin-bottom: 10px; display: inline-block; }
        
        main { flex: 1; padding: 20px; transition: 0.3s; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <span class="toggle-btn" onclick="toggleSidebar()">← 閉じる</span>
        <h2>検索</h2>
        <input type="text" id="searchInput" onkeyup="filterJobs()">
        <h3>スキルタグ</h3>
        <button onclick="filterBySkill('Java')">Java</button>
        <button onclick="filterBySkill('C#')">C#</button>
    </aside>

    <main>
        <span id="openBtn" class="toggle-btn hidden" onclick="toggleSidebar()">→ 開く</span>
        <h1>案件一覧</h1>
        <div id="jobList">
            <div class="card" data-skill="C# JavaScript">
                <h3>PLM構築支援対応</h3>
                <p>言語: C#, JavaScript</p>
                <div id="detail-1" class="hidden">
                    <p>概要: BOP、M-BOM、品質管理領域の開発</p>
                </div>
                <button onclick="toggleDetail('detail-1')">詳細を見る</button>
            </div>
        </div>
    </main>

    <script>
        // 1. サイドバー開閉機能
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const openBtn = document.getElementById('openBtn');
            sidebar.classList.toggle('closed');
            openBtn.classList.toggle('hidden');
        }

        // 2. 検索機能
        function filterJobs() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                let skill = card.getAttribute('data-skill').toLowerCase();
                card.style.display = skill.includes(input) ? "" : "none";
            }
        }

        // 3. 詳細開閉機能
        function toggleDetail(id) {
            document.getElementById(id).classList.toggle('hidden');
        }
    </script>
</body>
</html>
